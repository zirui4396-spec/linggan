<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFF8F0">
<title>灵感记录本</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FFF8F0;
  --warm: #F5EDE0;
  --ink: #2C2416;
  --ink-soft: #6B5E4E;
  --ink-faint: #B8A898;
  --accent: #D4614A;
  --accent-light: #F5E8E5;
  --gold: #C9943A;
  --gold-light: #FDF3E3;
  --green: #4A7C59;
  --green-light: #E8F2EC;
  --border: rgba(44,36,22,0.1);
  --border-soft: rgba(44,36,22,0.06);
  --shadow: 0 2px 20px rgba(44,36,22,0.08);
  --shadow-lg: 0 8px 40px rgba(44,36,22,0.12);
  --r: 16px;
  --r-sm: 10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--cream);
  color: var(--ink);
  font-family: 'Noto Sans SC', sans-serif;
}

/* ── LAYOUT ── */
.app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  position: relative;
  overflow: hidden;
}

/* desktop: side-by-side feel */
@media (min-width: 768px) {
  body { background: var(--warm); display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: auto; }
  .app { height: 90vh; max-height: 860px; border-radius: 28px; box-shadow: var(--shadow-lg), 0 0 0 0.5px var(--border); overflow: hidden; }
}

/* ── HEADER ── */
.header {
  padding: 18px 20px 14px;
  background: var(--cream);
  border-bottom: 0.5px solid var(--border);
  flex-shrink: 0;
}
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.logo { display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.logo-text { font-family: 'Noto Serif SC', serif; font-size: 17px; font-weight: 600; color: var(--ink); letter-spacing: 0.02em; }
.header-meta { font-size: 12px; color: var(--ink-faint); }

/* ── TABS ── */
.tabs { display: flex; gap: 0; background: var(--warm); border-radius: 10px; padding: 3px; }
.tab-btn {
  flex: 1; padding: 7px 4px; font-size: 13px; font-weight: 400;
  color: var(--ink-soft); background: none; border: none; border-radius: 8px;
  cursor: pointer; transition: all 0.2s; font-family: inherit;
  display: flex; align-items: center; justify-content: center; gap: 4px;
}
.tab-btn.active { background: var(--cream); color: var(--ink); font-weight: 500; box-shadow: 0 1px 4px rgba(44,36,22,0.1); }
.tab-badge { background: var(--accent); color: white; border-radius: 10px; padding: 1px 6px; font-size: 11px; }

/* ── MAIN SCROLL AREA ── */
.main { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; }
.main::-webkit-scrollbar { width: 0; }

/* ── SECTION ── */
.section { display: none; padding: 20px; animation: fadeUp 0.2s ease; }
.section.active { display: block; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

/* ── RECORD SECTION ── */
.record-label { font-size: 13px; color: var(--ink-soft); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.03em; }
.textarea-wrap { position: relative; margin-bottom: 6px; }
textarea {
  width: 100%; min-height: 130px; padding: 14px;
  background: white; border: 0.5px solid var(--border);
  border-radius: var(--r); font-size: 15px; line-height: 1.7;
  color: var(--ink); font-family: 'Noto Sans SC', sans-serif;
  resize: none; transition: border-color 0.2s; outline: none;
}
textarea:focus { border-color: var(--accent); }
textarea::placeholder { color: var(--ink-faint); font-size: 14px; }
.char-count { font-size: 11px; color: var(--ink-faint); text-align: right; margin-bottom: 14px; }

.scene-label { font-size: 13px; color: var(--ink-soft); margin-bottom: 8px; font-weight: 500; }
.tags-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
.tag {
  padding: 5px 12px; border-radius: 20px; font-size: 13px;
  border: 0.5px solid var(--border); background: white;
  color: var(--ink-soft); cursor: pointer; transition: all 0.15s;
  font-family: inherit;
}
.tag.active { background: var(--accent-light); border-color: var(--accent); color: var(--accent); font-weight: 500; }

.save-btn {
  width: 100%; padding: 14px; background: var(--ink); color: white;
  border: none; border-radius: var(--r); font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all 0.2s; letter-spacing: 0.02em;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.save-btn:active { transform: scale(0.98); opacity: 0.85; }
.save-btn.saved { background: var(--green); }

.save-tip { text-align: center; font-size: 13px; color: var(--green); margin-top: 10px; height: 18px; transition: opacity 0.3s; }

/* ── LIBRARY ── */
.filter-row { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 5px 14px; border-radius: 20px; font-size: 12px; white-space: nowrap;
  border: 0.5px solid var(--border); background: white; color: var(--ink-soft);
  cursor: pointer; transition: all 0.15s; font-family: inherit; flex-shrink: 0;
}
.filter-chip.active { background: var(--ink); border-color: var(--ink); color: white; }

.insights-list { display: flex; flex-direction: column; gap: 10px; }
.insight-card {
  background: white; border-radius: var(--r); border: 0.5px solid var(--border);
  padding: 14px 16px; transition: box-shadow 0.2s; cursor: default;
}
.insight-card:hover { box-shadow: var(--shadow); }
.card-text { font-size: 14px; line-height: 1.7; color: var(--ink); margin-bottom: 10px; }
.card-footer { display: flex; align-items: center; justify-content: space-between; }
.card-scene { font-size: 12px; color: white; background: var(--ink-faint); border-radius: 20px; padding: 2px 8px; }
.card-date { font-size: 12px; color: var(--ink-faint); }
.card-del { background: none; border: none; cursor: pointer; color: var(--ink-faint); font-size: 18px; padding: 2px 4px; transition: color 0.15s; margin-left: 8px; }
.card-del:hover { color: var(--accent); }

.empty-state { text-align: center; padding: 60px 20px; }
.empty-icon { font-size: 40px; margin-bottom: 12px; }
.empty-text { color: var(--ink-faint); font-size: 14px; line-height: 1.8; }

/* ── GENERATE ── */
.gen-tips { font-size: 13px; color: var(--ink-faint); margin-bottom: 16px; line-height: 1.6; }
.gen-insights { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
.gen-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 14px; background: white; border-radius: var(--r-sm);
  border: 0.5px solid var(--border); cursor: pointer; transition: all 0.15s;
}
.gen-item.checked { border-color: var(--accent); background: var(--accent-light); }
.gen-checkbox {
  width: 18px; height: 18px; border-radius: 5px; border: 1.5px solid var(--border);
  background: white; flex-shrink: 0; margin-top: 2px;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.gen-item.checked .gen-checkbox { background: var(--accent); border-color: var(--accent); }
.gen-checkbox::after { content: ''; width: 5px; height: 9px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg) translate(-1px, -1px); display: none; }
.gen-item.checked .gen-checkbox::after { display: block; }
.gen-item-text { font-size: 13px; line-height: 1.6; color: var(--ink); flex: 1; }
.gen-item-scene { font-size: 11px; color: var(--ink-faint); margin-top: 3px; }

.style-label { font-size: 13px; color: var(--ink-soft); margin-bottom: 8px; font-weight: 500; }
.style-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
.style-card {
  padding: 12px; background: white; border: 0.5px solid var(--border);
  border-radius: var(--r-sm); cursor: pointer; transition: all 0.15s;
  font-family: inherit;
}
.style-card.active { border-color: var(--accent); background: var(--accent-light); }
.style-name { font-size: 13px; font-weight: 500; color: var(--ink); margin-bottom: 3px; }
.style-desc { font-size: 11px; color: var(--ink-faint); line-height: 1.4; }
.style-card.active .style-name { color: var(--accent); }
.style-card.active .style-desc { color: var(--accent); opacity: 0.7; }

.gen-btn {
  width: 100%; padding: 14px; background: var(--accent); color: white;
  border: none; border-radius: var(--r); font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.gen-btn:active { transform: scale(0.98); }
.gen-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* ── RESULT ── */
.result-panel {
  margin-top: 20px; background: white; border-radius: var(--r);
  border: 0.5px solid var(--border); overflow: hidden;
}
.result-header {
  padding: 12px 16px; background: var(--gold-light);
  border-bottom: 0.5px solid rgba(201,148,58,0.2);
  display: flex; align-items: center; justify-content: space-between;
}
.result-label { font-size: 13px; font-weight: 500; color: var(--gold); display: flex; align-items: center; gap: 6px; }
.result-body { padding: 16px; }
.result-text { font-size: 14px; line-height: 1.9; color: var(--ink); white-space: pre-wrap; word-break: break-word; }
.result-actions { display: flex; gap: 8px; margin-top: 14px; padding-top: 14px; border-top: 0.5px solid var(--border-soft); }
.action-btn {
  flex: 1; padding: 10px; border-radius: var(--r-sm); font-size: 13px; font-weight: 500;
  cursor: pointer; font-family: inherit; transition: all 0.15s; border: 0.5px solid var(--border);
  background: white; color: var(--ink);
}
.action-btn:active { transform: scale(0.97); }
.action-btn.primary { background: var(--ink); color: white; border-color: var(--ink); }

/* loading */
.loading-wrap { padding: 30px; text-align: center; }
.loading-text { font-size: 14px; color: var(--ink-soft); margin-top: 12px; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── BOTTOM NAV (mobile) ── */
.bottom-nav {
  display: none;
  background: var(--cream); border-top: 0.5px solid var(--border);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom)); flex-shrink: 0;
}
@media (max-width: 767px) { .bottom-nav { display: flex; } }
.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 4px; cursor: pointer; border: none; background: none; font-family: inherit;
  color: var(--ink-faint); transition: color 0.15s;
}
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 22px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 500; letter-spacing: 0.02em; }
</style>
</head>
<body>
<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">✦</div>
        <span class="logo-text">灵感记录本</span>
      </div>
      <span class="header-meta" id="today-date"></span>
    </div>
    <!-- desktop tabs -->
    <div class="tabs" id="desktop-tabs" style="display:none;">
      <button class="tab-btn active" onclick="switchTab('record',this)">✏️ 记录</button>
      <button class="tab-btn" onclick="switchTab('library',this)">📚 灵感库 <span class="tab-badge" id="lib-badge">0</span></button>
      <button class="tab-btn" onclick="switchTab('generate',this)">✨ 生成文章</button>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- RECORD -->
    <div class="section active" id="sec-record">
      <div class="record-label">今天有什么感悟？</div>
      <div class="textarea-wrap">
        <textarea id="insight-input" placeholder="开会时发现，那些总能让人认同的人，不是讲道理最多的，而是最会「重复别人刚说过的话」的人……" maxlength="500" oninput="updateChar(this)"></textarea>
      </div>
      <div class="char-count"><span id="char-num">0</span> / 500</div>

      <div class="scene-label">场景标签</div>
      <div class="tags-row" id="scene-tags">
        <button class="tag active" onclick="selectTag(this,'开会中')">开会中</button>
        <button class="tag" onclick="selectTag(this,'通勤途中')">通勤途中</button>
        <button class="tag" onclick="selectTag(this,'和同事聊天')">和同事聊天</button>
        <button class="tag" onclick="selectTag(this,'读书时')">读书时</button>
        <button class="tag" onclick="selectTag(this,'深夜复盘')">深夜复盘</button>
        <button class="tag" onclick="selectTag(this,'其他')">其他</button>
      </div>

      <button class="save-btn" id="save-btn" onclick="saveInsight()">
        <span>保存感悟</span>
      </button>
      <div class="save-tip" id="save-tip"></div>
    </div>

    <!-- LIBRARY -->
    <div class="section" id="sec-library">
      <div class="filter-row" id="filter-row">
        <button class="filter-chip active" onclick="filterBy(this,'全部')">全部</button>
        <button class="filter-chip" onclick="filterBy(this,'开会中')">开会中</button>
        <button class="filter-chip" onclick="filterBy(this,'通勤途中')">通勤途中</button>
        <button class="filter-chip" onclick="filterBy(this,'和同事聊天')">和同事聊天</button>
        <button class="filter-chip" onclick="filterBy(this,'读书时')">读书时</button>
        <button class="filter-chip" onclick="filterBy(this,'深夜复盘')">深夜复盘</button>
        <button class="filter-chip" onclick="filterBy(this,'其他')">其他</button>
      </div>
      <div class="insights-list" id="insights-list"></div>
    </div>

    <!-- GENERATE -->
    <div class="section" id="sec-generate">
      <div class="gen-tips">勾选感悟，选择风格，AI帮你写一篇完整的小红书文章 📝</div>

      <div class="style-label">选择感悟</div>
      <div class="gen-insights" id="gen-insights"></div>

      <div class="style-label">文章风格</div>
      <div class="style-grid">
        <button class="style-card active" onclick="selectStyle(this,'干货分享型')" data-style="干货分享型">
          <div class="style-name">💡 干货分享</div>
          <div class="style-desc">方法论、清单、可操作建议</div>
        </button>
        <button class="style-card" onclick="selectStyle(this,'故事叙事型')" data-style="故事叙事型">
          <div class="style-name">📖 故事叙事</div>
          <div class="style-desc">有场景感的亲身经历</div>
        </button>
        <button class="style-card" onclick="selectStyle(this,'共鸣吐槽型')" data-style="共鸣吐槽型">
          <div class="style-name">😤 共鸣吐槽</div>
          <div class="style-desc">打工人情绪价值拉满</div>
        </button>
        <button class="style-card" onclick="selectStyle(this,'反常识揭秘型')" data-style="反常识揭秘型">
          <div class="style-name">🔍 反常识</div>
          <div class="style-desc">颠覆认知，让人点收藏</div>
        </button>
      </div>

      <button class="gen-btn" id="gen-btn" onclick="generateArticle()">✨ AI 帮我写一篇</button>
      <div id="result-area"></div>
      <div style="height:40px;"></div>
    </div>
  </div>

  <!-- BOTTOM NAV (mobile only) -->
  <nav class="bottom-nav">
    <button class="nav-item active" id="nav-record" onclick="switchTab('record',this,'nav')">
      <div class="nav-icon">✏️</div>
      <div class="nav-label">记录</div>
    </button>
    <button class="nav-item" id="nav-library" onclick="switchTab('library',this,'nav')">
      <div class="nav-icon">📚</div>
      <div class="nav-label">灵感库</div>
    </button>
    <button class="nav-item" id="nav-generate" onclick="switchTab('generate',this,'nav')">
      <div class="nav-icon">✨</div>
      <div class="nav-label">写文章</div>
    </button>
  </nav>
</div>

<script>
// ── STATE ──
let insights = JSON.parse(localStorage.getItem('xhs_insights') || '[]');
let selectedScene = '开会中';
let selectedStyle = '干货分享型';
let filterScene = '全部';
let currentTab = 'record';

// ── INIT ──
function init() {
  const d = new Date();
  document.getElementById('today-date').textContent = `${d.getMonth()+1}月${d.getDate()}日`;
  updateBadge();
  // show desktop tabs on wide screen
  if (window.innerWidth >= 768) {
    document.getElementById('desktop-tabs').style.display = 'flex';
  }
}

function save() {
  localStorage.setItem('xhs_insights', JSON.stringify(insights));
  updateBadge();
}

function updateBadge() {
  document.getElementById('lib-badge').textContent = insights.length;
}

// ── TAB SWITCHING ──
function switchTab(name, el, mode) {
  currentTab = name;
  // sections
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + name).classList.add('active');
  // desktop tabs
  if (mode !== 'nav') {
    document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
    if (el) el.classList.add('active');
  }
  // bottom nav
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
  const navEl = document.getElementById('nav-' + name);
  if (navEl) navEl.classList.add('active');
  // sync desktop tab highlight when triggered from nav
  if (mode === 'nav') {
    const idx = ['record','library','generate'].indexOf(name);
    document.querySelectorAll('.tabs .tab-btn').forEach((b,i) => b.classList.toggle('active', i===idx));
  }
  // render
  if (name === 'library') renderLibrary();
  if (name === 'generate') renderGenList();
  // scroll top
  document.querySelector('.main').scrollTop = 0;
}

// ── RECORD ──
function updateChar(el) {
  document.getElementById('char-num').textContent = el.value.length;
}
function selectTag(el, val) {
  document.querySelectorAll('#scene-tags .tag').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  selectedScene = val;
}
function saveInsight() {
  const text = document.getElementById('insight-input').value.trim();
  if (!text) { shakeTa(); return; }
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const dateStr = `${now.getMonth()+1}/${now.getDate()} ${pad(now.getHours())}:${pad(now.getMinutes())}`;
  insights.unshift({ id: Date.now(), text, scene: selectedScene, date: dateStr });
  save();
  document.getElementById('insight-input').value = '';
  document.getElementById('char-num').textContent = '0';
  showTip('已保存 ✓');
}
function shakeTa() {
  const ta = document.getElementById('insight-input');
  ta.style.borderColor = '#D4614A';
  setTimeout(() => ta.style.borderColor = '', 800);
}
function showTip(msg) {
  const tip = document.getElementById('save-tip');
  tip.textContent = msg;
  setTimeout(() => tip.textContent = '', 2000);
}

// ── LIBRARY ──
function filterBy(el, val) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  filterScene = val;
  renderLibrary();
}
function renderLibrary() {
  const list = document.getElementById('insights-list');
  const filtered = filterScene === '全部' ? insights : insights.filter(i => i.scene === filterScene);
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🌱</div><div class="empty-text">${insights.length===0?'还没有感悟<br>去记录第一条吧':'这个场景还没有记录'}</div></div>`;
    return;
  }
  list.innerHTML = filtered.map(ins => `
    <div class="insight-card">
      <div class="card-text">${esc(ins.text)}</div>
      <div class="card-footer">
        <span class="card-scene">${ins.scene}</span>
        <div style="display:flex;align-items:center;gap:0;">
          <span class="card-date">${ins.date}</span>
          <button class="card-del" onclick="deleteInsight(${ins.id})" title="删除">×</button>
        </div>
      </div>
    </div>
  `).join('');
}
function deleteInsight(id) {
  if (!confirm('删除这条感悟？')) return;
  insights = insights.filter(i => i.id !== id);
  save();
  renderLibrary();
}

// ── GENERATE ──
function renderGenList() {
  const wrap = document.getElementById('gen-insights');
  if (insights.length === 0) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-icon">📝</div><div class="empty-text">还没有感悟<br>先去记录几条吧</div></div>`;
    return;
  }
  wrap.innerHTML = insights.map(ins => `
    <div class="gen-item" id="gi${ins.id}" onclick="toggleGen(${ins.id})">
      <div class="gen-checkbox" id="gc${ins.id}"></div>
      <div>
        <div class="gen-item-text">${esc(ins.text)}</div>
        <div class="gen-item-scene">${ins.scene} · ${ins.date}</div>
      </div>
    </div>
  `).join('');
}
function toggleGen(id) {
  const ins = insights.find(i => i.id === id);
  if (!ins) return;
  ins._sel = !ins._sel;
  document.getElementById('gi'+id).classList.toggle('checked', !!ins._sel);
}
function selectStyle(el, val) {
  document.querySelectorAll('.style-card').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  selectedStyle = val;
}
async function generateArticle() {
  const selected = insights.filter(i => i._sel);
  if (selected.length === 0) { alert('请先勾选至少一条感悟'); return; }
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  const area = document.getElementById('result-area');
  area.innerHTML = `<div class="result-panel"><div class="loading-wrap"><div class="spinner"></div><div class="loading-text">AI 正在写作中…</div></div></div>`;
  document.querySelector('.main').scrollTop = 9999;

  const texts = selected.map(i => `【${i.scene}】${i.text}`).join('\n');
  const prompt = `你是一位深受职场人喜爱的小红书博主，擅长把生活感悟写成引发共鸣的职场内容。

根据以下感悟，写一篇完整的小红书文章，风格为「${selectedStyle}」：

${texts}

要求：
1. 标题：吸睛有力，带emoji，不超过25字
2. 正文：口语化，有画面感，适当分段，每段不超过4行，全文300-500字，多用emoji增加可读性
3. 结尾：一句有力的金句或行动引导
4. 话题标签：5-8个（#格式）

直接输出文章，不要任何解释。`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await res.json();
    const text = data.content?.map(c => c.text||'').join('') || '生成失败，请重试';
    area.innerHTML = `
      <div class="result-panel">
        <div class="result-header">
          <div class="result-label">✨ AI 生成结果</div>
        </div>
        <div class="result-body">
          <div class="result-text" id="result-text">${esc(text)}</div>
          <div class="result-actions">
            <button class="action-btn primary" onclick="copyResult()">复制文章</button>
            <button class="action-btn" onclick="generateArticle()">重新生成</button>
          </div>
        </div>
      </div>`;
    window._resultText = text;
    setTimeout(() => document.querySelector('.main').scrollTop = 9999, 100);
  } catch(e) {
    area.innerHTML = `<div class="result-panel"><div class="result-body"><div style="color:#D4614A;font-size:14px;">生成出错，请检查网络后重试</div></div></div>`;
  }
  btn.disabled = false;
}
function copyResult() {
  if (!window._resultText) return;
  navigator.clipboard.writeText(window._resultText).then(() => {
    const btn = event.target;
    btn.textContent = '已复制！';
    setTimeout(() => btn.textContent = '复制文章', 1500);
  });
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// responsive tabs
window.addEventListener('resize', () => {
  document.getElementById('desktop-tabs').style.display = window.innerWidth >= 768 ? 'flex' : 'none';
});

init();
</script>
</body>
</html>
